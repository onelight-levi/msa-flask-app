{% extends "base.html" %}

{% block title %}학습 과목 목록{% endblock %}
{% block header_title %}학습 과목 목록{% endblock %}

{% block content %}
<style>
    /* 이 페이지에서만 사용하는 스타일 */
    .subject-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
    }
    .subject-card {
        border: 1px solid #dee2e6;
        border-radius: 8px;
        background-color: #fff;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .subject-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0,0,0,0.07);
    }
    .subject-card a {
        display: block;
        padding: 2rem 1rem;
        text-align: center;
        text-decoration: none;
        color: #007bff;
        font-weight: 500;
        font-size: 1.1em;
    }
</style>

<div class="subject-grid">
    {% for subject in subjects %}
        <div class="subject-card">
            <a href="{{ url_for('subject_detail', subject_id=subject.id) }}">{{ subject.name }}</a>
        </div>
    {% else %}
        <p style="text-align: center; color: #6c757d;">등록된 학습 과목이 없습니다.</p>
    {% endfor %}
</div>
{% endblock %}
