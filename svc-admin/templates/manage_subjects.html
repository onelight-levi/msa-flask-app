{% extends "base.html" %}

{% block title %}과목 관리{% endblock %}
{% block header_title %}📚 과목 관리{% endblock %}

{% block content %}
<style>
    /* 이 페이지에서만 사용하는 스타일 */
    .section {
        background-color: #f8f9fa;
        padding: 1.5rem;
        border-radius: 8px;
        margin-bottom: 2rem;
        border: 1px solid #dee2e6;
    }
    .section h3 {
        margin-top: 0;
        margin-bottom: 1rem;
        border-bottom: 1px solid #ced4da;
        padding-bottom: 0.5rem;
    }
    .add-form {
        display: flex;
        gap: 10px;
    }
    .add-form input[type="text"] {
        flex-grow: 1;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 4px;
        font-size: 1em;
    }
    .subject-list {
        list-style-type: none;
        padding: 0;
    }
    .subject-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #e9ecef;
    }
    .subject-item:last-child {
        border-bottom: none;
    }
    .subject-item span {
        font-weight: 500;
    }
    .actions {
        display: flex;
        gap: 8px;
    }
    .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
        text-decoration: none;
        font-size: 0.9em;
    }
    .btn-submit { background-color: #28a745; }
    .btn-edit { background-color: #007bff; }
    .btn-delete { background-color: #dc3545; }
</style>

<div class="section">
    <h3>새 과목 추가</h3>
    <form method="post" class="add-form">
        <input type="text" name="name" placeholder="새 과목 이름 입력..." required>
        <button type="submit" class="btn btn-submit">추가</button>
    </form>
</div>

<div class="section">
    <h3>등록된 과목 목록</h3>
    <ul class="subject-list">
        {% for subject in subjects %}
        <li class="subject-item">
            <span>{{ subject.name }}</span>
            <div class="actions">
                <a href="{{ url_for('edit_subject', subject_id=subject.id) }}" class="btn btn-edit">수정</a>
                <form action="{{ url_for('delete_subject', subject_id=subject.id) }}" method="post" style="display: inline;" onsubmit="return confirm('정말 이 과목을 삭제하시겠습니까? 관련된 모든 학습 콘텐츠가 함께 삭제됩니다.');">
                    <button type="submit" class="btn btn-delete">삭제</button>
                </form>
            </div>
        </li>
        {% else %}
        <li style="text-align: center; padding: 1rem;">등록된 과목이 없습니다.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
