{% extends "base.html" %}

{% block title %}새 학습 콘텐츠 등록{% endblock %}
{% block header_title %}📝 새 학습 콘텐츠 등록{% endblock %}

{% block content %}
<link href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-ko-KR.min.js"></script>

<style>
    .add-form label { margin-bottom: 8px; font-weight: 600; }
    .add-form input, .add-form select { width: 100%; padding: 12px; margin-bottom: 1.5rem; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
    .note-editor.note-frame { margin-bottom: 1.5rem; }
    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 1rem; }
    .form-actions button, .form-actions a { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; color: white; font-weight: 500; }
    .btn-submit { background-color: #28a745; }
    .btn-cancel { background-color: #6c757d; }
    .storage-type-selector { margin-bottom: 1.5rem; }
    .storage-type-selector label { margin-right: 1.5rem; font-weight: normal; }
</style>

<form class="add-form" method="post" enctype="multipart/form-data">
    <div class="storage-type-selector">
        <strong>저장 방식 선택:</strong>
        <label><input type="radio" name="storage_type" value="editor" checked> 에디터로 작성</label>
        <label><input type="radio" name="storage_type" value="pdf"> PDF 파일 업로드</label>
    </div>

    <div>
        <label for="subject_id">과목 선택:</label>
        <select id="subject_id" name="subject_id" required>
            <option value="">-- 과목을 선택해주세요 --</option>
            {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="content_type">콘텐츠 타입:</label>
        <select id="content_type" name="content_type" required>
            <option value="이론">이론</option>
            <option value="실습">실습</option>
        </select>
    </div>
    <div>
        <label for="title">제목:</label>
        <input type="text" id="title" name="title" required>
    </div>

    <div id="editor-area">
        <label for="body">내용:</label>
        <textarea id="summernote" name="body"></textarea>
    </div>

    <div id="pdf-area" style="display: none;">
        <label for="pdf_file">PDF 파일:</label>
        <input type="file" id="pdf_file" name="pdf_file" accept=".pdf">
    </div>

    <div class="form-actions">
        <a href="{{ url_for('manage_content') }}" class="btn-cancel">취소</a>
        <button type="submit" class="btn-submit">등록하기</button>
    </div>
</form>

<script>
document.querySelectorAll('input[name="storage_type"]').forEach((elem) => {
    elem.addEventListener("change", function(event) {
        if (event.target.value === "pdf") {
            document.getElementById('pdf-area').style.display = 'block';
            document.getElementById('editor-area').style.display = 'none';
            document.getElementById('summernote').required = false;
            document.getElementById('pdf_file').required = true;
        } else {
            document.getElementById('pdf-area').style.display = 'none';
            document.getElementById('editor-area').style.display = 'block';
            document.getElementById('summernote').required = true;
            document.getElementById('pdf_file').required = false;
        }
    });
});
document.addEventListener('DOMContentLoaded', function() {
    document.querySelector('input[name="storage_type"][value="editor"]').dispatchEvent(new Event('change'));
});
</script>

{% include '_editor_assets.html' %}

{% endblock %}
