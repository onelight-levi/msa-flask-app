apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-auth
  namespace: msa-flask-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: onelight01/svc-auth:8611051bb3d282f8b82ab75c3fa57e778a187ae5
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
