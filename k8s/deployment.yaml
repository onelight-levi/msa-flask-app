apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-auth
  namespace: msa-flask
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: onelight01/svc-auth:placeholder
          ports:
            - containerPort: 5000
---
