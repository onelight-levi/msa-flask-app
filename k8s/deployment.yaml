apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-auth
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: onelight01/svc-auth:8fa3499d1fd492223c7489e74d81f16b211067a4
          ports:
            - containerPort: 5000
---
