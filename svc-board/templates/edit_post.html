{% extends "base.html" %}

{% block title %}게시글 수정{% endblock %}
{% block header_title %}게시글 수정{% endblock %}

{% block content %}
<style>
    /* 이 페이지에서만 사용하는 스타일 */
    .edit-form label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #495057;
    }
    .edit-form input[type="text"],
    .edit-form textarea {
        width: 100%;
        padding: 12px;
        margin-bottom: 1.5rem;
        border: 1px solid #ced4da;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 1em;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    .edit-form input[type="text"]:focus,
    .edit-form textarea:focus {
        border-color: #80bdff;
        outline: 0;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    }
    .edit-form textarea {
        min-height: 300px;
        resize: vertical;
        line-height: 1.6;
    }
    .form-actions {
        display: flex;
        justify-content: flex-end; /* 버튼을 오른쪽으로 정렬 */
        gap: 10px; /* 버튼 사이 간격 */
        margin-top: 1rem;
    }
    .form-actions button,
    .form-actions a {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        color: white;
        font-weight: 500;
        font-size: 0.95em;
    }
    .btn-submit { background-color: #007bff; }
    .btn-submit:hover { background-color: #0056b3; }
    .btn-cancel { background-color: #6c757d; }
    .btn-cancel:hover { background-color: #5a6268; }
</style>

{% if post %}
    <form class="edit-form" method="post">
        <div>
            <label for="title">제목</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>
        <div>
            <label for="content">내용</label>
            <textarea id="content" name="content" required>{{ post.content }}</textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('view_post', post_id=post.id) }}" class="btn-cancel">취소</a>
            <button type="submit" class="btn-submit">수정 완료</button>
        </div>
    </form>
{% else %}
    <p class="message error">수정할 게시글을 찾을 수 없습니다.</p>
    <div style="text-align: center; margin-top: 2rem;">
        <a href="{{ url_for('board_list') }}" class="btn-cancel">목록으로 돌아가기</a>
    </div>
{% endif %}
{% endblock %}
