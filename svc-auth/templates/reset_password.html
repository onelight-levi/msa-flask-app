{% extends "base.html" %}

{% block title %}비밀번호 재설정{% endblock %}
{% block header_title %}비밀번호 재설정{% endblock %}

{% block content %}
<style>
    /* 이 페이지에서만 사용하는 스타일 */
    .auth-form label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #495057;
    }
    .auth-form input {
        width: 100%;
        padding: 12px;
        margin-bottom: 1rem;
        border: 1px solid #ced4da;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 1em;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    .auth-form input:focus {
        border-color: #80bdff;
        outline: 0;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    }
    .btn {
        display: block;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 500;
        text-decoration: none;
        text-align: center;
        box-sizing: border-box;
        margin-top: 10px;
    }
    .btn-primary { background-color: #28a745; color: white; }
    .btn-secondary { background-color: #6c757d; color: white; }
</style>

<form class="auth-form" action="{{ url_for('reset_password') }}" method="post">
    <div>
        <label for="new_password">새 비밀번호:</label>
        <input type="password" id="new_password" name="new_password" title="8자 이상, 영문 대/소문자, 숫자, 특수문자 조합" required>
    </div>
    <div>
        <label for="confirm_password">새 비밀번호 확인:</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
    </div>
    <button type="submit" class="btn btn-primary">비밀번호 변경</button>
</form>

<a href="{{ url_for('index') }}" class="btn btn-secondary">취소</a>
{% endblock %}
