{% extends "base.html" %}

{% block title %}비밀번호 찾기{% endblock %}
{% block header_title %}비밀번호 찾기{% endblock %}

{% block content %}
<style>
    /* 이 페이지에서만 사용하는 스타일 */
    .description {
        text-align: center;
        color: #6c757d;
        font-size: 0.95em;
        margin-bottom: 2rem;
        line-height: 1.6;
    }
    .auth-form label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #495057;
    }
    .auth-form input {
        width: 100%;
        padding: 12px;
        margin-bottom: 1rem;
        border: 1px solid #ced4da;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 1em;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    .auth-form input:focus {
        border-color: #80bdff;
        outline: 0;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    }
    .btn {
        display: block;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 500;
        text-decoration: none;
        text-align: center;
        box-sizing: border-box;
        margin-top: 10px;
    }
    .btn-primary { background-color: #007bff; color: white; }
    .btn-secondary { background-color: #6c757d; color: white; }
</style>

<p class="description">가입 시 등록한 아이디와 휴대폰 번호를 입력해주세요.<br>계정 확인 후 비밀번호를 재설정합니다.</p>

<form class="auth-form" action="{{ url_for('forgot_password') }}" method="post">
    <div>
        <label for="username">아이디:</label>
        <input type="text" id="username" name="username" required>
    </div>
    <div>
        <label for="phone_number">핸드폰 번호:</label>
        <input type="tel" id="phone_number" name="phone_number" placeholder="'-' 없이 숫자만 입력" required>
    </div>
    <button type="submit" class="btn btn-primary">계정 확인</button>
</form>

<a href="{{ url_for('index') }}" class="btn btn-secondary">로그인 페이지로 돌아가기</a>
{% endblock %}
